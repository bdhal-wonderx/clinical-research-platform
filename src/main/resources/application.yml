spring:
  application:
    name: rwe-platform

  datasource:
    url: jdbc:postgresql://115.124.127.46:5432/wondrxdev?currentSchema=wondrx
    username: wrx_wondrxserver
    password: Wo15nd4rx24s5er18ve5r@pP
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: wondrx
        format_sql: true
    show-sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /

rwe:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-key-to-a-256-bit-value-in-production-env}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  otp:
    expiration-seconds: ${OTP_EXPIRATION_SECONDS:300}
    length: 6
  ocr:
    service-url: ${OCR_SERVICE_URL:}
    mock-enabled: ${OCR_MOCK_ENABLED:true}
  storage:
    upload-dir: ${UPLOAD_DIR:uploads}
  followup:
    cron: ${FOLLOWUP_CRON:0 0 8 * * *}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.wonderx.rwe: INFO
    org.springframework.security: WARN
